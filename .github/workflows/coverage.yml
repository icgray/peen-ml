name: Code Coverage

on:
  push:
    paths-ignore:
      - src/peen-ml/dataset1_script.py
      - src/peen-ml/dataset2_script.py
  pull_request:
    paths-ignore:
      - src/peen-ml/dataset1_script.py
      - src/peen-ml/dataset2_script.py

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src/peen-ml" >> $GITHUB_ENV

      - name: Install system tkinter
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov scipy torch matplotlib numpy pillow trimesh pandas requests

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --ignore=tests/test_taichi_impact_sim.py \
            --ignore=tests/test_data_viz.py \
            --cov=src/peen-ml \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
