name: Linting and PEP 8 Checks

on: 
  push:
    paths-ignore:
      - src/peen-ml/dataset1_script.py
      - src/peen-ml/dataset2_script.py
  pull_request:
    paths-ignore:
      - src/peen-ml/dataset1_script.py
      - src/peen-ml/dataset2_script.py

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/src/peen-ml" >> $GITHUB_ENV
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 "black==24.8.0" torch matplotlib numpy pytest

    - name: Analyse the code with pylint
      run: |
        pylint --fail-under=9.5 --disable=C0301,C0114,C0116,C0103,R0914,R0913,R0915,R0902,R1725,C0410,R0801,C0413,E0401,W0621,C0415,W0611,W0612,W0613,C0115,W0718,W1514,R0917,R0912,W1309,R0402,R0124,C0302,C2401,W0404,C0411,C0412,R1735,W1404,R0903,R1732,R1716,W0212,W0625,W0640,C0206,C0325,W0125,W0632 --ignore=src/peen-ml/dataset1_script.py,src/peen-ml/dataset2_script.py,capture_screenshots.py $(git ls-files '*.py')
    - name: Check PEP 8 compliance with flake8
      run: |
        flake8 --ignore=E501,E402,E203,E226,E401,W503,F401,F811,F841,F541,E266,E741 $(git ls-files '*.py')
    - name: Autoformat code with Black (PEP 8 enforcement)
      run: |
        black --line-length=120 --target-version py311 --check $(git ls-files '*.py')
